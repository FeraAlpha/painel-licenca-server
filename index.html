<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fera Alpha</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --bg:#f6f7ff;
      --card:#ffffff;
      --card2:#f0f3ff;
      --border:#d7ddff;
      --text:#0f172a;
      --muted:#64748b;

      --primary:#4f7cff;
      --primary2:#6a5cff;
      --glow: rgba(79,124,255,.22);

      --warning:#ffd166;
      --shadow: 0 16px 45px rgba(15, 23, 42, .10);
      --radius:18px;
    }

    *{
      margin:0;padding:0;
      box-sizing:border-box;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    }

    body{
      min-height:100vh;
      color:var(--text);
      padding:18px;
      background:
        radial-gradient(900px 550px at 20% 0%, rgba(79,124,255,.14), transparent 60%),
        radial-gradient(900px 550px at 85% 15%, rgba(106,92,255,.12), transparent 60%),
        linear-gradient(180deg, #fff, #f6f7ff);
    }

    .wrap{max-width:720px;margin:0 auto}

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 18px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      margin-bottom:18px;
    }

    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      width:42px;height:42px;border-radius:14px;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      display:flex;align-items:center;justify-content:center;
      color:white;font-weight:900;
      box-shadow: 0 12px 26px var(--glow);
    }

    .chip{
      padding:8px 12px;
      border:1px solid var(--border);
      border-radius:999px;
      color:var(--muted);
      font-size:12px;
      display:flex;
      align-items:center;
      gap:8px;
      background: var(--card2);
    }

    .card{
      background: var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      box-shadow: var(--shadow);
    }
    .card + .card{margin-top:14px;}

    .title{display:flex;align-items:center;gap:10px}
    .title i{color:var(--primary)}
    .title h2{font-size:16px;font-weight:900}
    .sub{font-size:12px;color:var(--muted)}

    .field{margin-bottom:12px}
    label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      display:flex;
      gap:8px;
      margin-bottom:6px;
    }

    input{
      width:100%;
      padding:13px 14px;
      background: var(--card2);
      border:1px solid var(--border);
      border-radius:14px;
      font-size:14px;
    }

    .days{display:flex;gap:10px;flex-wrap:wrap}
    .daybtn{
      flex:1;
      min-width:140px;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--border);
      background: var(--card2);
      font-weight:900;
      text-align:center;
      cursor:pointer;
      transition:.2s;
    }

    .daybtn.active{
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color:white;
      border-color:transparent;
    }

    .btn{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:none;
      font-weight:900;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .btn-primary{
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color:white;
    }

    .btn-soft{
      background: var(--card2);
      border:1px solid var(--border);
    }

    .rowbtns{display:flex;gap:10px;margin-top:10px}
    .rowbtns .btn{flex:1}

    .loader{display:none;gap:10px;margin-top:12px}
    .spin{
      width:18px;height:18px;border-radius:50%;
      border:3px solid rgba(0,0,0,.15);
      border-top-color:var(--primary);
      animation:spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="logo"><i class="fas fa-dragon"></i></div>
      <div>
        <h1>Fera Alpha</h1>
        <p class="sub">Painel de Geração de Licenças</p>
      </div>
    </div>
    <div class="chip"><i class="fas fa-shield-halved"></i> Revendedor</div>
  </div>

  <div class="card">
    <div class="title">
      <i class="fas fa-bolt"></i>
      <div>
        <h2>Gerar Licença</h2>
        <div class="sub">Somente 40, 70 ou 110 dias • Token salvo</div>
      </div>
    </div>

    <div class="field">
      <label><i class="fas fa-user"></i> Nome do Cliente</label>
      <input id="username">
    </div>

    <div class="field">
      <label><i class="fas fa-lock"></i> Senha</label>
      <input id="password">
    </div>

    <div class="field">
      <label><i class="fas fa-calendar-days"></i> Período</label>
      <div class="days">
        <div class="daybtn active" id="btn40" onclick="setDays(40)">40 Dias</div>
        <div class="daybtn" id="btn70" onclick="setDays(70)">70 Dias</div>
        <div class="daybtn" id="btn110" onclick="setDays(110)">110 Dias</div>
      </div>
    </div>

    <div class="field">
      <label><i class="fas fa-fingerprint"></i> Token</label>
      <input id="token" type="password">
      <div class="rowbtns">
        <button class="btn btn-soft" onclick="saveToken()">Salvar Token</button>
        <button class="btn btn-soft" onclick="clearToken()">Limpar</button>
      </div>
    </div>

    <button class="btn btn-primary" onclick="generateLicense()">
      <i class="fas fa-bolt"></i> Gerar Licença
    </button>

    <div class="loader" id="loader">
      <div class="spin"></div> Gerando...
    </div>
  </div>

</div>

<script>
const API_URL = "https://painel-licenca-server.onrender.com/reseller/generate";
const TOKEN_KEY = "feraalpha_revendedor_token";
const PREFIX = "FERA";

let currentDays = 40;

function setDays(days){
  currentDays = days;
  ["40","70","110"].forEach(d=>{
    document.getElementById("btn"+d).classList.toggle("active", Number(d)===days);
  });
}

function saveToken(){
  localStorage.setItem(TOKEN_KEY, token.value.trim());
}

function clearToken(){
  localStorage.removeItem(TOKEN_KEY);
  token.value="";
}

async function generateLicense(){
  loader.style.display="flex";
  await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:new URLSearchParams({
      username:username.value,
      password:password.value,
      expire_days:String(currentDays),
      token:token.value,
      prefix:PREFIX
    })
  });
  loader.style.display="none";
}
</script>
</body>
</html>
