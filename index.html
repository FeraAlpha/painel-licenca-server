<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fera Alpha — Geração de Licenças</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
  background:#0f1220;
  color:#fff;
  padding:20px;
}
.card{
  background:#171a2e;
  border-radius:14px;
  padding:18px;
  margin-bottom:18px;
}
.cardhead{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}
.title h2{margin:0;font-size:18px}
.sub{opacity:.6;font-size:13px}

.field{margin-bottom:14px}
label{display:block;font-weight:700;margin-bottom:6px}
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#0e1022;
  color:#fff;
}

.days{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.daybtn{
  background:#0e1022;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  font-weight:800;
  border:2px solid transparent;
}

.daybtn.active{
  border-color:#4aa3ff;
  background:#11153a;
}

.price{opacity:.8}

.btn{
  width:100%;
  padding:14px;
  border-radius:12px;
  font-size:15px;
  font-weight:900;
  border:none;
  cursor:pointer;
}

.btn-primary{background:#4aa3ff;color:#000}
.btn-soft{background:#23265a}
.btn-danger{background:#3a1b1b}

.rowbtns{
  display:flex;
  gap:10px;
  margin-top:8px;
}

.mutedSmall{
  opacity:.6;
  font-size:12px;
}

.loader{
  display:none;
  margin-top:14px;
  gap:10px;
  align-items:center;
}
.spin{
  width:18px;
  height:18px;
  border:3px solid #333;
  border-top:3px solid #4aa3ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.resultBox{
  margin-top:14px;
  background:#0e1022;
  padding:12px;
  border-radius:10px;
  font-size:13px;
}

.history div{
  font-size:13px;
  opacity:.85;
  margin-bottom:6px;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#1f8b4c;
  padding:14px;
  border-radius:12px;
  display:none;
  gap:10px;
}
</style>
</head>

<body>

<div class="card">
  <div class="cardhead">
    <i class="fas fa-bolt"></i>
    <div class="title">
      <h2>Gerar Licença</h2>
      <div class="sub">Planos com preço • Senha automática</div>
    </div>
  </div>

  <div class="field">
    <label><i class="fas fa-user"></i> Nome do Cliente</label>
    <input id="username" placeholder="ex: cliente_joao">
  </div>

  <div class="field">
    <label><i class="fas fa-lock"></i> Senha (automática)</label>
    <input id="password">
  </div>

  <div class="field">
    <label><i class="fas fa-calendar-days"></i> Plano</label>
    <div class="days">
      <div class="daybtn active" onclick="setDays(7,'Sorteio')">🎁 7 dias <span class="price">Sorteio</span></div>
      <div class="daybtn" onclick="setDays(35,'R$ 30,00')">35 dias <span class="price">R$ 30,00</span></div>
      <div class="daybtn" onclick="setDays(65,'R$ 50,00')">65 dias <span class="price">R$ 50,00</span></div>
      <div class="daybtn" onclick="setDays(110,'R$ 75,00')">110 dias <span class="price">R$ 75,00</span></div>
    </div>
  </div>

  <div class="field">
    <label><i class="fas fa-fingerprint"></i> Token do Revendedor</label>
    <input id="token" type="password">
    <div class="rowbtns">
      <button class="btn btn-soft" onclick="saveToken()">Salvar Token</button>
      <button class="btn btn-danger" onclick="clearToken()">Limpar</button>
    </div>
  </div>

  <button class="btn btn-primary" onclick="generateLicense()">Gerar Licença</button>

  <div class="loader" id="loader">
    <div class="spin"></div> Gerando licença...
  </div>

  <div class="resultBox" id="resultBox"></div>
</div>

<div class="card">
  <div class="cardhead">
    <i class="fas fa-clock-rotate-left"></i>
    <div class="title">
      <h2>Últimos Gerados</h2>
      <div class="sub">Histórico local</div>
    </div>
  </div>
  <div class="history" id="historyList"></div>
</div>

<script>
let selectedDays = 7;
let selectedPrice = 'Sorteio';

function setDays(days, price){
  selectedDays = days;
  selectedPrice = price;
  document.querySelectorAll('.daybtn').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

function generatePassword(len=10){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789@#!';
  return Array.from({length:len},()=>c[Math.floor(Math.random()*c.length)]).join('');
}

function saveToken(){
  localStorage.setItem('fera_token',token.value);
  alert('Token salvo');
}
function clearToken(){
  localStorage.removeItem('fera_token');
  token.value='';
}

function generateLicense(){
  loader.style.display='flex';
  setTimeout(()=>{
    loader.style.display='none';
    const info=`Cliente: ${username.value}<br>
    Dias: ${selectedDays}<br>
    Plano: ${selectedPrice}<br>
    Senha: ${password.value}`;
    resultBox.innerHTML=info;

    addHistory(info.replace(/<br>/g,' • '));
    password.value=generatePassword();
  },1200);
}

function addHistory(text){
  let h=JSON.parse(localStorage.getItem('history')||'[]');
  h.unshift(text);
  h=h.slice(0,10);
  localStorage.setItem('history',JSON.stringify(h));
  renderHistory();
}
function renderHistory(){
  let h=JSON.parse(localStorage.getItem('history')||'[]');
  historyList.innerHTML=h.map(i=>`<div>• ${i}</div>`).join('');
}

window.onload=()=>{
  password.value=generatePassword();
  token.value=localStorage.getItem('fera_token')||'';
  renderHistory();
};
</script>

</body>
</html>
